# Default configuration for slopc.
# Overridable via SLOP_* env vars or #[slop(...)] attributes.

model = "gpt-4o-mini"
retries = 5
provider = "https://openrouter.ai/api/v1/chat/completions"
api_key_env = "OPEN_ROUTER_API_KEY"

# Enable runtime execution of doctests at compile time (default: false).
# WARNING: This compiles and runs LLM-generated code unsandboxed.
run_doctests = false
